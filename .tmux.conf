# --- 1. ГЛОБАЛЬНЫЕ НАСТРОЙКИ ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g focus-events on

# Индексация с 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Мгновенный выход из Insert в Vim
set -s escape-time 0
set -g history-limit 50000

# --- 2. ГОРЯЧИЕ КЛАВИШИ ---
bind-key -n C-l next-window
bind-key -n C-h previous-window
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- 3. ПЛАГИНЫ ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# --- 4. SOLARIZED LIGHT MONO МИНИМАЛИЗМ ---
set -g status-interval 1
set -g status-position bottom
set -g status-justify left

# Прозрачный фон
set -g status-style "bg=default,fg=#586e75" # fg = base01 (основной текст)

# Левая часть: Сессия (Base01 - темно-серый, жирный)
set -g status-left "#[fg=#586e75,bold] #S #[fg=#93a1a1,nobold]│ "
set -g status-left-length 20

# Правая часть: Время (Base1 - приглушенный серый)
set -g status-right "#[fg=#93a1a1,bg=default] %H:%M "
set -g status-right-length 20

# --- НАСТРОЙКА ВКЛАДОК ---
# Неактивные: Base1 (#93a1a1)
setw -g window-status-style "fg=#93a1a1,bg=default"
setw -g window-status-format " #I:#W "

# Гасим последнюю использованную
setw -g window-status-last-style "fg=#93a1a1,bg=default"

# Активная вкладка: Base01 (#586e75) - глубокий серый без синевы
setw -g window-status-current-style "fg=#586e75,bg=default,bold"
setw -g window-status-current-format " #I:#W "

setw -g window-status-separator ""

# Границы панелей (Base2 для мягкости)
set -g pane-border-style "fg=#eee8d5"
set -g pane-active-border-style "fg=#93a1a1"

# --- 5. ИНИЦИАЛИЗАЦИЯ TPM ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
